services:
  postgres:
    image: postgres:16-alpine
    container_name: fingram-postgres
    environment:
      POSTGRES_USER: fingram
      POSTGRES_PASSWORD: fingram
      POSTGRES_DB: fingram
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
